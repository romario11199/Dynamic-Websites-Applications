<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form - Question 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Payment Information</h1>
        
        <form id="paymentForm">
            <!-- Payment Method Section -->
            <div class="form-section">
                <h3>Payment Method</h3>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="paymentMethod" value="credit" checked> 
                        Credit Card
                    </label>
                    <label>
                        <input type="radio" name="paymentMethod" value="paypal"> 
                        PayPal
                    </label>
                </div>
            </div>

            <!-- Billing Information -->
            <div class="form-section">
                <h3>Billing Information</h3>
                
                <div class="form-group">
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="address">Billing Address *</label>
                    <input type="text" id="address" name="address" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">City *</label>
                        <input type="text" id="city" name="city" required>
                    </div>
                    <div class="form-group">
                        <label for="zipCode">ZIP Code *</label>
                        <input type="text" id="zipCode" name="zipCode" required>
                    </div>
                </div>
            </div>

            <!-- Credit Card Information -->
            <div class="form-section" id="creditCardSection">
                <h3>Credit Card Information</h3>
                
                <div class="form-group">
                    <label for="cardNumber">Card Number *</label>
                    <input type="text" id="cardNumber" name="cardNumber" 
                           placeholder="1234 5678 9012 3456" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="expiry">Expiry Date *</label>
                        <input type="text" id="expiry" name="expiry" 
                               placeholder="MM/YY" required>
                    </div>
                    <div class="form-group">
                        <label for="cvv">CVV *</label>
                        <input type="text" id="cvv" name="cvv" 
                               placeholder="123" required>
                    </div>
                </div>
            </div>

            <!-- Shipping Toggle -->
            <div class="form-section">
                <label class="checkbox-label">
                    <input type="checkbox" id="sameAsBilling" checked>
                    Same as billing information
                </label>
            </div>

            <!-- Shipping Information -->
            <div class="form-section" id="shippingSection" style="display: none;">
                <h3>Shipping Information</h3>
                
                <div class="form-group">
                    <label for="shippingAddress">Shipping Address</label>
                    <input type="text" id="shippingAddress" name="shippingAddress">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="shippingCity">City</label>
                        <input type="text" id="shippingCity" name="shippingCity">
                    </div>
                    <div class="form-group">
                        <label for="shippingZip">ZIP Code</label>
                        <input type="text" id="shippingZip" name="shippingZip">
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit Payment</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
